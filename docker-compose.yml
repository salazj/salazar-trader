x-common-volumes: &common-volumes
  - ./data:/app/data
  - ./logs:/app/logs
  - ./model_artifacts:/app/model_artifacts
  - ./reports:/app/reports

services:
  # ── Backend (FastAPI + BotManager) ─────────────────────────────────
  backend:
    image: ghcr.io/salazj/salazar-trader:latest
    container_name: salazar-backend
    env_file: .env
    restart: unless-stopped
    command: ["api"]
    ports:
      - "${API_PORT:-8000}:8000"
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Frontend (React served by nginx, proxies to backend) ───────────
  frontend:
    image: ghcr.io/salazj/salazar-trader-frontend:latest
    container_name: salazar-frontend
    restart: unless-stopped
    ports:
      - "${GUI_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Legacy standalone bot (for CLI usage without GUI) ──────────────
  bot:
    image: ghcr.io/salazj/salazar-trader:latest
    container_name: salazar-trader
    env_file: .env
    restart: unless-stopped
    command: ["bot"]
    volumes: *common-volumes
    ports:
      - "${HEALTH_PORT:-8880}:8880"
    profiles:
      - standalone

  # ── Backtest runner (one-shot) ─────────────────────────────────────
  backtest:
    image: ghcr.io/salazj/salazar-trader:latest
    container_name: salazar-trader-backtest
    env_file: .env
    restart: "no"
    environment:
      - BOT_MODE=backtest
      - DRY_RUN=true
    volumes: *common-volumes
    profiles:
      - tools
    command: ["backtest"]

  # ── Model training (one-shot) ──────────────────────────────────────
  train:
    image: ghcr.io/salazj/salazar-trader:latest
    container_name: salazar-trader-train
    env_file: .env
    restart: "no"
    environment:
      - BOT_MODE=train
      - DRY_RUN=true
    volumes: *common-volumes
    profiles:
      - tools
    command: ["train"]
